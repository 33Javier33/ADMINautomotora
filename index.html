<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AutoGestión Pro | CarlosPN Interactive®</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700" rel="stylesheet"/>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "dark": "#0f172a",
                        "success": "#10b981",
                        "danger": "#ef4444",
                        "warning": "#f59e0b",
                    },
                    fontFamily: { "display": ["Inter"] },
                },
            },
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; margin: 0; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        
        /* --- EFECTO SKELETON SHIMMER (TU CÓDIGO) --- */
        .skeleton { background: #f1f5f9; position: relative; overflow: hidden; border-radius: 2rem; min-height: 400px; }
        .skeleton::after {
            content: ""; position: absolute; top: 0; right: 0; bottom: 0; left: 0;
            transform: translateX(-100%);
            background: linear-gradient(90deg, rgba(255,255,255,0) 0, rgba(255,255,255,0.5) 50%, rgba(255,255,255,0) 100%);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 100% { transform: translateX(100%); } }

        #loadingBar { height: 4px; background: #137fec; width: 0%; position: fixed; top: 0; transition: 0.3s; z-index: 5000; }
        
        #portalAcceso { position: fixed; inset: 0; background: #0f172a; z-index: 2000; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .login-card { background: white; padding: 3rem 2.5rem; border-radius: 2.5rem; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        
        input, select, textarea { width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 1.2rem; margin-bottom: 12px; outline: none; font-size: 16px; transition: all 0.3s; background-color: #f1f5f9; }

        .btn-loading { width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: btn-spin 0.6s linear infinite; }
        @keyframes btn-spin { to { transform: rotate(360deg); } }

        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #0f172a; color: white; padding: 10px 20px; border-radius: 1rem; font-size: 12px; font-weight: 800; z-index: 9999; display: none; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }

        /* --- MOSAICO CARLOSPN (ESTILOS PROTEGIDOS) --- */
        #cards.grid-cols-mosaic { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; gap: 0.75rem !important; padding: 0.75rem !important; }
        .card-expanded { grid-column: 1 / -1 !important; transform: scale(1.01); z-index: 20; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2); }

        #cards.grid-cols-mosaic .card-item:not(.card-expanded) .p-8 { padding: 0.75rem !important; }
        #cards.grid-cols-mosaic .card-item:not(.card-expanded) .card-brand { font-size: 13px !important; }
        #cards.grid-cols-mosaic .card-item:not(.card-expanded) .card-model { font-size: 11px !important; margin-top: -2px; }
        #cards.grid-cols-mosaic .card-item:not(.card-expanded) .badge-patente { font-size: 9px !important; padding: 2px 4px !important; }
        
        #cards.grid-cols-mosaic .card-item:not(.card-expanded) .tech-info-row { gap: 6px !important; display: flex !important; flex-direction: column !important; }
        #cards.grid-cols-mosaic .card-item:not(.card-expanded) .tech-item { flex-direction: column !important; align-items: flex-start !important; border-bottom: none !important; padding: 0 !important; }
        #cards.grid-cols-mosaic .card-item:not(.card-expanded) .tech-item span { display: block !important; font-size: 8px !important; color: #94a3b8 !important; font-weight: 900; }
        #cards.grid-cols-mosaic .card-item:not(.card-expanded) .tech-item b { font-size: 10px !important; color: #1e293b !important; }
        
        #cards.grid-cols-mosaic .card-item:not(.card-expanded) .price-block span:first-child { font-size: 8px !important; }
        #cards.grid-cols-mosaic .card-item:not(.card-expanded) .price-block span:last-child { font-size: 1.1rem !important; }
        #cards.grid-cols-mosaic .card-item:not(.card-expanded) .actions-group button { height: 34px !important; font-size: 11px !important; }

        .card-item { position: relative; transition: all 0.3s ease; cursor: pointer; }
        .card-item.is-sold::after { content: "VENDIDO"; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%) rotate(-15deg); border: 4px solid #ef4444; color: #ef4444; padding: 5px 10px; font-size: 1.5rem; font-weight: 900; background: rgba(255,255,255,0.9); z-index: 10; border-radius: 0.5rem; pointer-events: none; }
        .card-item.is-reserved::after { content: "RESERVADO"; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%) rotate(-15deg); border: 4px solid #f59e0b; color: #f59e0b; padding: 5px 10px; font-size: 1.2rem; font-weight: 900; background: rgba(255,255,255,0.9); z-index: 10; border-radius: 0.5rem; pointer-events: none; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.8); backdrop-filter: blur(4px); z-index: 3000; display: none; justify-content: center; align-items: center; padding: 15px; }
        .modal-content { background: white; padding: 2.5rem; border-radius: 2.5rem; width: 100%; max-width: 850px; max-height: 90vh; overflow-y: auto; position: relative; }
        @media (max-width: 1023px) { .main-view { padding-bottom: 120px; } }
    </style>
</head>
<body class="font-display antialiased">

<div id="loadingBar"></div>
<div id="toast">Copiado al portapapeles</div>

<div id="portalAcceso">
    <div class="login-card">
        <h2 class="text-3xl font-black text-primary mb-8 italic tracking-tighter uppercase leading-none text-center">CarlosPN<br><span class="text-dark">Interactive®</span></h2>
        <div id="stepLogin" class="space-y-4">
            <select id="selBranch"><option value="">Cargando sucursales...</option></select>
            <input type="text" id="usrR" placeholder="Tu RUT">
            <input type="password" id="usrP" placeholder="Contraseña">
            <button class="w-full bg-primary text-white py-5 rounded-[1.2rem] font-black uppercase italic tracking-widest shadow-xl transition-all" onclick="autenticar(true)">INGRESAR AL PANEL</button>
            <button class="w-full text-[10px] font-black text-slate-400 uppercase tracking-widest mt-6" onclick="document.getElementById('stepLogin').style.display='none'; document.getElementById('stepAdmin').style.display='block';">— MODO MAESTRO —</button>
        </div>
        <div id="stepAdmin" style="display:none;" class="space-y-4">
            <input type="text" id="admR" placeholder="RUT Maestro">
            <input type="password" id="admP" placeholder="Clave Maestro">
            <button class="w-full bg-dark text-white py-5 rounded-[1.2rem] font-black uppercase italic tracking-widest hover:brightness-125 shadow-xl transition-all" onclick="autenticar(false)">ACCESO TOTAL</button>
            <button class="w-full text-[10px] font-black text-slate-400 uppercase tracking-widest mt-6" onclick="document.getElementById('stepLogin').style.display='block'; document.getElementById('stepAdmin').style.display='none';">VOLVER ATRÁS</button>
        </div>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <nav class="bg-white px-6 py-4 flex justify-between items-center border-b border-slate-100 shadow-sm sticky top-0 z-50">
        <div class="flex flex-col">
            <span class="text-sm font-black text-primary uppercase italic leading-none tracking-tighter">AutoGestión Pro</span>
            <div class="flex items-center gap-2 mt-1">
                <span id="sucursalLabel" class="bg-primary text-white text-[10px] px-3 py-1 rounded-full font-black uppercase italic tracking-widest leading-none">SIN SUCURSAL</span>
                <span id="rolLabel" class="text-[9px] font-bold text-slate-400 uppercase italic">ROL: ---</span>
            </div>
        </div>
        <button onclick="cerrarSesion()" class="bg-danger/10 text-danger text-[10px] px-4 py-2 rounded-xl font-black uppercase italic tracking-widest hover:bg-danger hover:text-white transition-all">Salir</button>
    </nav>

    <nav id="bottomNavAdmin" class="lg:hidden fixed bottom-0 left-0 w-full bg-white/95 backdrop-blur-xl border-t border-slate-100 z-[100] h-20 flex items-center justify-around px-6">
        <button onclick="toggleMosaic()" class="flex flex-col items-center gap-1 text-slate-400"><span id="mosaicIcon" class="material-symbols-outlined text-2xl">grid_view</span><span class="text-[9px] font-bold uppercase tracking-widest">Mosaico</span></button>
        <button id="btnStaff" onclick="document.getElementById('modalStaff').style.display='flex'" class="flex flex-col items-center gap-1 text-dark"><span class="material-symbols-outlined text-2xl">person_add</span><span class="text-[9px] font-bold uppercase tracking-widest">Equipo</span></button>
        <button id="btnPlusVehiculo" onclick="abrirM()" class="flex flex-col items-center gap-1 text-primary"><span class="material-symbols-outlined text-3xl font-black">add_circle</span><span class="text-[9px] font-bold uppercase tracking-widest">Vehículo</span></button>
    </nav>

    <div id="viewPlanilla" class="main-view overflow-y-auto pb-32">
        <div class="max-w-7xl mx-auto p-6">
            <div class="mb-6">
                <span id="stockT" class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic mb-2 block">STOCK: 0</span>
                <input id="search" onkeyup="render()" type="text" class="w-full bg-white border border-slate-100 rounded-2xl py-4 px-6 text-sm shadow-sm" placeholder="🔍 Buscar patente, marca, modelo..."/>
            </div>
            <div id="cards" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 transition-all duration-500"></div>
        </div>
    </div>

    <div id="viewMaestro" style="display:none;" class="p-6 max-w-4xl mx-auto pb-32">
        <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-xl mb-6">
            <h3 class="text-xl font-black text-dark uppercase italic mb-6 tracking-tighter">Gestión de Sedes</h3>
            <div class="flex flex-col md:flex-row gap-3"><input type="text" id="newB" placeholder="Nombre Nueva Sucursal" class="bg-slate-50 m-0"><button class="bg-primary text-white px-8 py-4 rounded-2xl font-black uppercase italic shadow-lg" onclick="crearB()">CREAR SEDE</button></div>
        </div>
        <div id="listaSuc" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>
</div>

<div id="modalVehiculo" class="modal-overlay">
    <div class="modal-content no-scrollbar">
        <div class="flex justify-between items-center mb-8"><h2 class="text-2xl font-black text-primary uppercase italic tracking-tighter leading-none">Ficha del Vehículo</h2><button onclick="cerrarM()" class="material-symbols-outlined text-slate-400 text-3xl">close</button></div>
        <form id="formV" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <input type="hidden" id="editId">
            <div class="flex flex-col"><label class="text-[9px] font-black uppercase text-slate-400 ml-2 mb-1 italic tracking-widest leading-none">ID Interno</label><input type="text" id="idEx" placeholder="Ej: 2121"></div>
            <div class="flex flex-col"><label class="text-[9px] font-black uppercase text-slate-400 ml-2 mb-1 italic tracking-widest leading-none">Patente</label><input type="text" id="pat" required class="uppercase font-bold"></div>
            <div class="flex flex-col"><label class="text-[9px] font-black uppercase text-slate-400 ml-2 mb-1 italic tracking-widest leading-none">Marca</label><input type="text" id="mar" required></div>
            <div class="flex flex-col"><label class="text-[9px] font-black uppercase text-slate-400 ml-2 mb-1 italic tracking-widest leading-none">Modelo</label><input type="text" id="mod" required></div>
            <div class="flex flex-col"><label class="text-[9px] font-black uppercase text-slate-400 ml-2 mb-1 italic tracking-widest leading-none">Año</label><input type="text" id="ani"></div>
            <div class="flex flex-col"><label class="text-[9px] font-black uppercase text-slate-400 ml-2 mb-1 italic tracking-widest leading-none">KM</label><input type="text" id="km" inputmode="numeric" oninput="formatN(this)"></div>
            <div class="flex flex-col"><label class="text-[9px] font-black uppercase text-slate-400 ml-2 mb-1 italic tracking-widest leading-none">Color</label><input type="text" id="col"></div>
            <div class="flex flex-col"><label class="text-[9px] font-black uppercase text-slate-400 ml-2 mb-1 italic tracking-widest leading-none">Combustible</label><select id="com"><option>Bencina</option><option>Diesel</option><option>Híbrido</option><option>Eléctrico</option></select></div>
            <div class="flex flex-col"><label class="text-[9px] font-black uppercase text-slate-400 ml-2 mb-1 italic tracking-widest leading-none">Dueño Original</label><input type="text" id="due"></div>
            <div class="flex flex-col"><label class="text-[9px] font-black uppercase text-slate-400 ml-2 mb-1 italic tracking-widest leading-none">Fono</label><input type="tel" id="fon"></div>
            <div class="flex flex-col"><label class="text-[9px] font-black uppercase text-danger ml-2 mb-1 italic font-bold tracking-widest leading-none">Costo Dueño ($)</label><input type="text" id="pD" inputmode="numeric" oninput="formatN(this)" class="bg-red-50 border-red-100 text-danger font-black"></div>
            <div class="flex flex-col"><label class="text-[9px] font-black uppercase text-success ml-2 mb-1 italic font-bold tracking-widest leading-none">Precio Venta ($)</label><input type="text" id="pV" inputmode="numeric" oninput="formatN(this)" class="bg-emerald-50 border-emerald-100 text-success font-black"></div>
            <div class="md:col-span-3"><label class="text-[9px] font-black uppercase text-slate-400 ml-2 mb-1 italic tracking-widest leading-none">URL Instagram</label><input type="url" id="ins" placeholder="https://instagram.com/p/..."></div>
            <div class="md:col-span-3"><label class="text-[9px] font-black uppercase text-slate-400 ml-2 mb-1 italic tracking-widest leading-none">Observaciones</label><textarea id="obs" rows="3"></textarea></div>
            <button type="submit" id="btnGuardarVehiculo" class="md:col-span-3 bg-primary text-white py-5 rounded-3xl font-black uppercase italic tracking-widest shadow-2xl transition-all mt-4 flex items-center justify-center gap-3">
                <span id="btnText">GUARDAR VEHÍCULO</span>
            </button>
        </form>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxpb_JPinHuk2Ex44UWqZHROfhPXUbmzSLmDfh34SdGzzKh9W5fPPBpVdxuPRJHbENa/exec"; 
    const KEY = "CPN_INTERACTIVE_2026_SECURE";
    let sucA = "", miRol = "", inventory = [], isMosaic = false;

    function formatN(i) { let v = i.value.replace(/\D/g, ""); i.value = v ? Number(v).toLocaleString("de-DE") : ""; }
    function cerrarM() { document.getElementById('modalVehiculo').style.display='none'; }
    function abrirM() { document.getElementById('modalVehiculo').style.display='flex'; document.getElementById('formV').reset(); document.getElementById('editId').value=''; }
    function copyT(txt) { navigator.clipboard.writeText(txt).then(() => { const t = document.getElementById('toast'); t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }); }

    function toggleMosaic() {
        isMosaic = !isMosaic;
        localStorage.setItem('cpn_is_mosaic', isMosaic);
        updateMosaicView();
    }

    function updateMosaicView() {
        const icon = document.getElementById('mosaicIcon');
        document.getElementById('cards').classList.toggle('grid-cols-mosaic', isMosaic);
        if(icon) icon.innerText = isMosaic ? 'view_agenda' : 'grid_view';
        render();
    }

    function expandCard(cardId) {
        if (!isMosaic) return;
        const allCards = document.querySelectorAll('.card-item');
        const currentCard = document.getElementById(cardId);
        const isAlreadyExpanded = currentCard.classList.contains('card-expanded');
        allCards.forEach(c => c.classList.remove('card-expanded'));
        if (!isAlreadyExpanded) {
            currentCard.classList.add('card-expanded');
            setTimeout(() => currentCard.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
        }
        render(true);
    }

    function renderSkeletons() {
        const container = document.getElementById('cards');
        container.innerHTML = '';
        for(let i=0; i<6; i++) { container.innerHTML += `<div class="skeleton"></div>`; }
    }

    window.onload = () => {
        isMosaic = localStorage.getItem('cpn_is_mosaic') === 'true';
        const savedSession = localStorage.getItem('cpn_session');
        if (savedSession) {
            const data = JSON.parse(savedSession);
            sucA = data.sucursal; miRol = data.rol; iniciarApp();
        } else { cargarSuc(); }
    };

    function cerrarSesion() { localStorage.removeItem('cpn_session'); location.reload(); }

    async function cargarSuc() {
        try {
            const res = await fetch(`${SCRIPT_URL}?key=${KEY}&action=get_branches`);
            const data = await res.json();
            const sel = document.getElementById('selBranch');
            if(sel) {
                sel.innerHTML = '<option value="">-- Elige Sede --</option>';
                data.forEach(s => sel.innerHTML += `<option value="${s[1]}">${s[1]}</option>`);
            }
            const list = document.getElementById('listaSuc');
            if(list) {
                list.innerHTML = '';
                data.forEach(s => {
                    list.innerHTML += `<div class="flex flex-col p-6 bg-white border border-slate-100 rounded-[2rem] shadow-sm"><div class="flex justify-between items-center mb-4"><b class="text-lg font-black uppercase italic text-dark tracking-tighter">${s[1]}</b></div><div class="grid grid-cols-2 gap-2"><button onclick="entrarM('${s[1]}')" class="bg-success text-white text-[10px] py-3 rounded-xl font-black uppercase italic shadow-sm">Entrar</button><button id="btn-del-${s[0]}" onclick="borrarSuc('${s[0]}', '${s[1]}')" class="bg-danger/10 text-danger text-[10px] py-3 rounded-xl font-black uppercase italic tracking-widest">Borrar</button></div></div>`;
                });
            }
        } catch(e) { console.error(e); }
    }

    async function autenticar(esSuc) {
        const rut = document.getElementById(esSuc ? 'usrR' : 'admR').value;
        const pass = document.getElementById(esSuc ? 'usrP' : 'admP').value;
        const branch = esSuc ? document.getElementById('selBranch').value : null;
        if(!rut || !pass) return alert("Falta RUT o Clave");
        try {
            const res = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "auth_any", rut, pass, branch, key: KEY }) });
            const data = await res.json();
            if(data.success) { miRol = data.rol; sucA = branch; localStorage.setItem('cpn_session', JSON.stringify({ rol: miRol, sucursal: sucA })); iniciarApp(); } else alert("Acceso denegado");
        } catch(e) { console.error(e); }
    }

    function iniciarApp() {
        document.getElementById('portalAcceso').style.display='none'; 
        document.getElementById('mainApp').style.display='block';
        if(miRol === "MAESTRO") { document.getElementById('viewMaestro').style.display='block'; cargarSuc(); }
        else { 
            document.getElementById('viewPlanilla').style.display='block'; 
            document.getElementById('sucursalLabel').innerText = sucA.toUpperCase(); 
            document.getElementById('rolLabel').innerText = "ROL: " + miRol; 
            updateMosaicView();
            loadInv(); 
        }
    }

    function render(isExpansionCall = false) {
        const container = document.getElementById('cards'), term = document.getElementById('search').value.toLowerCase();
        if (isExpansionCall) {
            document.querySelectorAll('.card-item').forEach(card => {
                const extra = card.querySelector('.extra-info');
                if (card.classList.contains('card-expanded') || !isMosaic) extra?.classList.remove('hidden'); else extra?.classList.add('hidden');
            });
            return;
        }
        const filtered = inventory.filter(c => !term || JSON.stringify(c).toLowerCase().includes(term));
        container.innerHTML = ''; 
        document.getElementById('stockT').innerText = `STOCK: ${filtered.length}`;
        
        filtered.forEach(c => {
            const isS = c.estado === "Vendido", isR = c.estado === "Reservado", cardId = `car-item-${c.id}`;
            const card = document.createElement('div'); card.id = cardId;
            card.className = `card-item bg-white rounded-[2rem] border border-slate-100 overflow-hidden relative shadow-lg flex flex-col ${isS ? 'is-sold' : (isR ? 'is-reserved' : '')}`;
            
            card.onclick = (e) => { if (e.target.closest('button') || e.target.closest('a') || e.target.closest('.badge-id')) return; expandCard(cardId); };

            let btns = miRol === "Vendedor" ? `<button id="btn-R-${c.id}" class="w-full bg-warning text-white py-4 rounded-2xl font-black uppercase italic text-[10px] shadow-md flex items-center justify-center gap-2" onclick="upS('${c.id}', '${isR?'Disponible':'Reservado'}', 'btn-R-${c.id}')">${isR ? 'Liberar' : 'RESERVAR'}</button>` : `<div class="actions-group flex gap-2 w-full justify-between"><button id="btn-R-${c.id}" class="flex-1 h-12 flex items-center justify-center bg-warning text-white rounded-xl font-black text-sm shadow-md" onclick="upS('${c.id}', '${isR?'Disponible':'Reservado'}', 'btn-R-${c.id}')">${isR ? 'D' : 'R'}</button><button id="btn-V-${c.id}" class="flex-1 h-12 flex items-center justify-center bg-success text-white rounded-xl font-black text-sm shadow-md" onclick="upS('${c.id}', '${isS?'Disponible':'Vendido'}', 'btn-V-${c.id}')">${isS ? 'D' : '$'}</button><button class="flex-1 h-12 flex items-center justify-center bg-primary text-white rounded-xl font-black text-sm shadow-md" onclick='editC(${JSON.stringify(c)})'>✏️</button><button class="flex-1 h-12 flex items-center justify-center bg-danger text-white rounded-xl font-black text-sm shadow-md" onclick="delC('${c.id}')">🗑️</button></div>`;
            
            card.innerHTML = `<div class="p-8 border-b border-slate-50 flex justify-between items-start gap-4"><div class="min-w-0 flex flex-col title-container"><b class="card-brand text-xl font-black text-dark uppercase italic tracking-tighter leading-none block truncate">${c.marca}</b><span class="card-model text-sm font-bold text-slate-400 uppercase italic truncate">${c.modelo}</span><div class="flex gap-2 mt-3"><span onclick="copyT('${c.idExterno}')" class="badge-id cursor-pointer active:opacity-50 text-[9px] font-black uppercase text-primary italic bg-primary/5 px-2 rounded-md tracking-widest leading-none flex items-center gap-1">ID ${c.idExterno || '---'} <span class="material-symbols-outlined text-[10px]">content_copy</span></span><span class="text-[9px] font-black uppercase text-slate-400 italic py-1 leading-none">${c.anio}</span></div></div><span class="bg-dark text-white px-3 py-1.5 rounded-lg font-mono font-black text-[11px] leading-none badge-patente flex-shrink-0 uppercase">${c.patente || 'S/P'}</span></div><div class="p-8 tech-info-row flex flex-col gap-3 text-[10px] font-bold text-slate-500 uppercase italic flex-grow"><div class="tech-item flex justify-between border-b border-slate-50 pb-1"><span>Kilometraje</span> <b class="text-dark">${Number(c.km || 0).toLocaleString('de-DE')}</b></div><div class="tech-item flex justify-between border-b border-slate-50 pb-1"><span>Dueño</span> <b class="text-dark">${c.dueno || '---'}</b></div><div class="tech-item flex justify-between border-b border-slate-50 pb-1 flex-wrap"><span>Teléfono</span> <b><a href="tel:${c.fono}" class="text-primary underline">${c.fono || '---'}</a></b></div><div class="tech-item flex justify-between border-b border-slate-50 pb-1"><span>Combustible</span> <b class="text-dark">${c.combustible || 'S/I'}</b></div><div class="tech-item flex justify-between border-b border-slate-50 pb-1"><span>Color</span> <b class="text-dark">${c.color || 'S/I'}</b></div><div class="extra-info mt-2 space-y-2">${c.instagram ? `<a href="${c.instagram}" target="_blank" class="bg-primary text-white p-3 rounded-xl font-black flex items-center justify-center gap-2 mt-1 text-[10px] uppercase italic tracking-widest shadow-md">INSTAGRAM <span class="material-symbols-outlined text-sm">photo_camera</span></a>` : ''}${c.obs ? `<div class="bg-warning/5 text-warning p-3 rounded-xl border-l-4 border-warning leading-tight mt-1 text-[9px]">${c.obs}</div>` : ''}</div></div><div class="p-8 bg-slate-50 border-t border-slate-100 flex flex-col gap-4"><div class="price-block flex flex-col"><span class="text-danger text-[9px] font-black italic mb-1">COSTO DUEÑO: $${Number(c.pDueno).toLocaleString('de-DE')}</span><span class="text-primary text-3xl font-black italic tracking-tighter leading-none">$${Number(c.pVenta).toLocaleString('de-DE')}</span></div><div class="actions-group">${btns}</div></div>`;
            container.appendChild(card);
        });
    }

    async function loadInv(silent = false) { if(!silent) renderSkeletons(); const res = await fetch(`${SCRIPT_URL}?action=read&key=${KEY}&branch=${sucA}`); inventory = await res.json(); render(); }
    async function upS(id, st, btnId) { const btn = document.getElementById(btnId); btn.innerHTML = '<div class="btn-loading mx-auto"></div>'; await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "toggle_status", id, branch: sucA, newStatus: st, key: KEY }) }); loadInv(true); }
    async function delC(id) { if(!confirm("¿Borrar?")) return; await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "delete_car", id, branch: sucA, key: KEY }) }); loadInv(true); }
    function editC(c) { abrirM(); document.getElementById('editId').value = c.id; document.getElementById('idEx').value = c.idExterno || ""; document.getElementById('pat').value = c.patente; document.getElementById('mar').value = c.marca; document.getElementById('mod').value = c.modelo; document.getElementById('ani').value = c.anio; document.getElementById('km').value = c.km; document.getElementById('col').value = c.color; document.getElementById('due').value = c.dueno; document.getElementById('fon').value = c.fono; document.getElementById('pD').value = c.pDueno; document.getElementById('pV').value = c.pVenta; document.getElementById('ins').value = c.instagram; document.getElementById('obs').value = c.obs; document.getElementById('com').value = c.combustible; formatN(document.getElementById('km')); formatN(document.getElementById('pD')); formatN(document.getElementById('pV')); }
    
    document.getElementById('formV').onsubmit = async (e) => { 
        e.preventDefault(); 
        const btn = document.getElementById('btnGuardarVehiculo');
        const textSpan = document.getElementById('btnText');
        btn.disabled = true; btn.classList.add('brightness-90'); textSpan.style.display = 'none';
        const spin = document.createElement('div'); spin.className = 'btn-loading'; btn.appendChild(spin);
        const d = { action: "save", key: KEY, sucursal: sucA, editId: document.getElementById('editId').value, patente: document.getElementById('pat').value.toUpperCase(), marca: document.getElementById('mar').value, modelo: document.getElementById('mod').value, anio: document.getElementById('ani').value, km: document.getElementById('km').value.replace(/\./g,''), pDueno: document.getElementById('pD').value.replace(/\./g,''), pVenta: document.getElementById('pV').value.replace(/\./g,''), fono: document.getElementById('fon').value, color: document.getElementById('col').value, dueno: document.getElementById('due').value, obs: document.getElementById('obs').value, idExterno: document.getElementById('idEx').value, combustible: document.getElementById('com').value, instagram: document.getElementById('ins').value }; 
        await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(d) }); 
        cerrarM(); loadInv(true); 
        btn.disabled = false; btn.classList.remove('brightness-90'); spin.remove(); textSpan.style.display = 'inline';
    };

    function entrarM(n) { sucA = n; miRol = "MAESTRO"; localStorage.setItem('cpn_session', JSON.stringify({ rol: miRol, sucursal: sucA })); iniciarApp(); }
    async function crearB() { const n = document.getElementById('newB').value; if(!n) return; await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "create_branch", nombre: n, key: KEY }) }); document.getElementById('newB').value = ''; cargarSuc(); }
    async function crearStaff() { const n = document.getElementById('stNombre').value, r = document.getElementById('stR').value, p = document.getElementById('stP').value, rol = document.getElementById('stRol').value; if(!n || !r || !p) return alert("Faltan datos"); await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "create_staff", nombre: n, newRut: r, newPass: p, branch: sucA, rol: rol, key: KEY }) }); alert("Guardado"); document.getElementById('modalStaff').style.display='none'; }
</script>
</body>
