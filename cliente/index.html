<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Automotora | CarlosPN Interactive®</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#ffffff",
                    },
                    fontFamily: { "display": ["Inter"] },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "0.5rem", "xl": "1rem", "2xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #0f172a; overflow-x: hidden; margin: 0; padding: 0; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        
        /* --- EFECTO CARGA SKELETON (TU CÓDIGO) --- */
        .skeleton { background: #f1f5f9; position: relative; overflow: hidden; }
        .skeleton::after {
            content: ""; position: absolute; top: 0; right: 0; bottom: 0; left: 0;
            transform: translateX(-100%);
            background: linear-gradient(90deg, rgba(255,255,255,0) 0, rgba(255,255,255,0.5) 50%, rgba(255,255,255,0) 100%);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 100% { transform: translateX(100%); } }

        .chip-branch, .chip-brand { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); flex-shrink: 0; cursor: pointer; }
        .chip-active { background-color: #137fec !important; color: #ffffff !important; transform: scale(1.05); }
        
        #brandDrawer { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .drawer-open { transform: translateX(0) !important; }

        @media (min-width: 1024px) { .main-content { margin-left: 280px; } }
        @media (max-width: 1023px) { 
            .section-view { padding-bottom: 100px; } 
            #section-admin { padding-bottom: 0px !important; }
        }

        /* --- ESTILOS MOSAICO CARLOSPN (PROTEGIDOS) --- */
        #mainGrid.grid-cols-mosaic {
            grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
            gap: 0.75rem !important; padding-left: 0.5rem !important; padding-right: 0.5rem !important;
        }
        #mainGrid.grid-cols-mosaic .p-10 { padding: 0.8rem !important; }
        #mainGrid.grid-cols-mosaic h3 { font-size: 13px !important; line-height: 1 !important; margin-bottom: 4px !important; }
        #mainGrid.grid-cols-mosaic .text-4xl { font-size: 1.1rem !important; }
        #mainGrid.grid-cols-mosaic .h-64 { height: 100px !important; }
        #mainGrid.grid-cols-mosaic .grid-cols-2 { display: flex !important; flex-direction: column !important; gap: 2px !important; }
        #mainGrid.grid-cols-mosaic .grid-cols-2 div { font-size: 8px !important; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        #dynamicHeader { position: relative; overflow: hidden; background-color: #0f172a; }
        .watermark-bg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); min-width: 100%; min-height: 100%; object-fit: cover; opacity: 0.4; z-index: 1; }
        .header-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(15,23,42,0.75), rgba(15,23,42,0.9)); z-index: 2; }
        .header-content { position: relative; z-index: 3; }
        .text-shadow-lg { text-shadow: 0 4px 12px rgba(0,0,0,0.8); }

        /* BOTÓN STOCK LATERAL (SOLO ADMIN) */
        #btnReturnToStock {
            position: fixed; top: 50%; right: 0; transform: translateY(-50%);
            z-index: 9999; background: #137fec; color: white;
            padding: 20px 8px; border-radius: 20px 0 0 20px;
            display: none; flex-direction: column; align-items: center; gap: 8px;
            box-shadow: -5px 0 20px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2);
            border-right: none;
        }
    </style>
</head>

<body class="font-display antialiased">
    
    <button id="mosaicFloatingBtn" onclick="toggleMosaic()" class="lg:hidden fixed bottom-24 left-6 z-[110] bg-white text-slate-900 w-14 h-14 rounded-full shadow-2xl flex items-center justify-center border border-slate-200 active:scale-95 transition-all">
        <span id="mosaicIcon" class="material-symbols-outlined">grid_view</span>
    </button>

    <button id="btnReturnToStock" onclick="handleStockClick()" class="active:scale-90 transition-all">
        <span class="material-symbols-outlined text-xl">directions_car</span>
        <span class="text-[9px] font-black uppercase italic tracking-tighter" style="writing-mode: vertical-lr; transform: rotate(180deg);">STOCK</span>
    </button>

    <aside class="hidden lg:flex fixed left-0 top-0 h-screen w-[280px] bg-white border-r border-slate-100 flex-col z-50">
        <div class="p-8">
            <div class="flex flex-col items-center mb-10 fade-in">
                <img src="../img/logo.png" alt="Logo" class="w-24 h-auto mb-4 object-contain">
                <span class="text-xl font-bold tracking-tight text-slate-900 leading-none uppercase italic">Automotora</span>
            </div>
            <nav class="space-y-2">
                <button onclick="handleStockClick()" id="btn-nav-catalog" class="w-full flex items-center gap-4 px-6 py-4 rounded-2xl bg-primary text-white font-bold text-xs uppercase tracking-widest transition-all nav-btn shadow-lg italic">
                    <span class="material-symbols-outlined">directions_car</span> Catálogo
                </button>
                <button onclick="toggleDrawer()" id="btn-sidebar-brands" class="w-full flex items-center gap-4 px-6 py-4 rounded-2xl hover:bg-slate-50 text-slate-500 font-bold text-xs uppercase tracking-widest transition-all italic">
                    <span class="material-symbols-outlined">branding_watermark</span> Marcas
                </button>
                <button onclick="showSection('admin')" id="btn-nav-admin" class="w-full flex items-center gap-4 px-6 py-4 rounded-2xl hover:bg-slate-50 text-slate-500 font-bold text-xs uppercase tracking-widest transition-all nav-btn italic">
                    <span class="material-symbols-outlined">admin_panel_settings</span> Admin Panel
                </button>
            </nav>
        </div>
        <div class="mt-auto p-8 border-t border-slate-50 text-center text-slate-400 italic font-bold">
            <p class="text-[10px] uppercase mb-2 tracking-widest">Puerto Varas</p>
            <p class="text-sm text-primary italic font-bold">+56 9 2007 8076</p>
        </div>
    </aside>

    <nav id="bottomNav" class="lg:hidden fixed bottom-0 left-0 w-full bg-white/95 backdrop-blur-xl border-t border-slate-100 z-[100] h-20 flex items-center justify-around px-6 transition-all duration-300">
        <button id="btn-bottom-brands" onclick="toggleDrawer()" class="flex flex-col items-center gap-1 text-slate-400">
            <span class="material-symbols-outlined text-2xl">menu</span>
            <span class="text-[9px] font-bold uppercase italic">Marcas</span>
        </button>
        <button onclick="handleStockClick()" class="flex flex-col items-center gap-1 text-primary font-bold">
            <span class="material-symbols-outlined text-2xl font-bold italic">directions_car</span>
            <span class="text-[9px] font-bold uppercase tracking-widest italic">Stock</span>
        </button>
        <button id="btn-bottom-admin" onclick="showSection('admin')" class="flex flex-col items-center gap-1 text-slate-400">
            <span class="material-symbols-outlined text-2xl italic">lock</span>
            <span class="text-[9px] font-bold uppercase tracking-widest italic tracking-tighter">Admin</span>
        </button>
    </nav>

    <div class="main-content min-h-screen">
        <section id="section-catalog" class="section-view overflow-y-auto">
            <header id="dynamicHeader" class="relative py-16 md:py-32 px-6 text-center">
                <img src="../img/logo.png" class="watermark-bg" alt="">
                <div class="header-overlay"></div>
                
                <div id="headerDefault" class="header-content fade-in">
                    <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/10 border border-white/20 mb-6 text-white">
                        <span class="text-[10px] font-black uppercase tracking-widest italic">Tu socio de confianza en el sur</span>
                    </div>
                    <h1 class="text-4xl md:text-7xl font-black tracking-tighter mb-4 leading-none uppercase italic text-white text-shadow-lg">Automotora <span class="text-primary italic">Stock</span></h1>
                    <p class="text-white/90 max-w-2xl mx-auto text-base leading-relaxed italic px-4 text-shadow-lg">Somos una automotora de confianza en <b>Puerto Varas</b>.</p>
                </div>

                <div id="headerBranch" class="header-content hidden fade-in">
                    <button onclick="resetBranchFilter()" class="mb-4 text-white font-bold text-[10px] uppercase tracking-widest flex items-center gap-2 mx-auto italic">
                        <span class="material-symbols-outlined text-sm">arrow_back</span> Ver todas las sucursales
                    </button>
                    <h1 id="branchTitle" class="text-4xl md:text-7xl font-black tracking-tighter leading-tight uppercase text-white mb-8 italic text-shadow-lg">---</h1>
                </div>
            </header>

            <div id="filterContainerArea" class="max-w-7xl mx-auto px-6 mb-12 overflow-x-auto no-scrollbar pt-8 text-center">
                <div id="dynamicChips" class="flex flex-nowrap md:flex-wrap justify-start md:justify-center gap-3">
                    <div class="skeleton w-32 h-10 rounded-2xl"></div>
                    <div class="skeleton w-32 h-10 rounded-2xl"></div>
                </div>
            </div>

            <main class="max-w-7xl mx-auto px-4 md:px-10 pb-20">
                <div class="mb-10 flex justify-center">
                    <input id="searchInput" onkeyup="renderAll()" type="text" class="w-full md:w-96 px-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-slate-900 text-sm shadow-sm italic" placeholder="Buscar vehículo..."/>
                </div>
                
                <div id="mainGrid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-8 transition-all duration-500">
                    <div class="skeleton h-[450px] rounded-[2rem]"></div>
                    <div class="skeleton h-[450px] rounded-[2rem]"></div>
                    <div class="skeleton h-[450px] rounded-[2rem]"></div>
                </div>
            </main>
        </section>

        <section id="section-admin" class="section-view hidden h-screen w-full bg-slate-50 overflow-hidden">
            <iframe id="adminIframe" src="https://admi-nautomotora.vercel.app/" class="w-full h-full border-none"></iframe>
        </section>
    </div>

    <aside id="brandDrawer" class="fixed top-0 left-0 h-full w-[280px] bg-white z-[200] border-r border-slate-100 -translate-x-full shadow-2xl overflow-y-auto">
        <div class="p-8">
            <div class="flex items-center justify-between mb-8"><span class="text-xs font-black uppercase tracking-widest text-primary italic">Marcas</span><button onclick="toggleDrawer()" class="material-symbols-outlined text-slate-400">close</button></div>
            <div id="drawerBrandList" class="grid grid-cols-2 gap-4"></div>
        </div>
    </aside>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxpb_JPinHuk2Ex44UWqZHROfhPXUbmzSLmDfh34SdGzzKh9W5fPPBpVdxuPRJHbENa/exec"; 
        const KEY = "CPN_INTERACTIVE_2026_SECURE";
        const WHATSAPP_NUMBER = "56920078076";
        
        let globalInventory = [], globalBranches = [], activeFilter = null, brandFilter = null, currentSection = 'catalog', isMosaic = false;

        function toggleDrawer() { document.getElementById('brandDrawer').classList.toggle('drawer-open'); }

        function toggleMosaic(forceState = null) {
            isMosaic = (forceState !== null) ? forceState : !isMosaic;
            const grid = document.getElementById('mainGrid');
            const icon = document.getElementById('mosaicIcon');
            if (isMosaic) { grid.classList.add('grid-cols-mosaic'); if(icon) icon.innerText = 'view_agenda'; }
            else { grid.classList.remove('grid-cols-mosaic'); if(icon) icon.innerText = 'grid_view'; }
            localStorage.setItem('automotora_mosaic_pref', isMosaic);
        }

        async function initApp() {
            try {
                const resB = await fetch(`${SCRIPT_URL}?key=${KEY}&action=get_branches`);
                globalBranches = await resB.json();
                renderChips(globalBranches);
                const promises = globalBranches.map(b => fetch(`${SCRIPT_URL}?action=read&key=${KEY}&branch=${b[1]}`).then(r => r.json()));
                const results = await Promise.all(promises);
                results.forEach((data, index) => {
                    const branchName = globalBranches[index][1];
                    globalInventory = [...globalInventory, ...data.filter(c => c.estado !== "Vendido").map(c => ({...c, sucursalOrigen: branchName}))];
                });
                globalInventory.sort(() => Math.random() - 0.5);
                renderBrandDrawer();
                const mosaicPref = localStorage.getItem('automotora_mosaic_pref');
                if (mosaicPref !== null) isMosaic = (mosaicPref === 'true');
                toggleMosaic(isMosaic);
                renderAll();
            } catch(e) { console.error("Error."); }
        }

        function handleStockClick() {
            if (currentSection !== 'catalog') showSection('catalog');
            else if (activeFilter !== null) resetBranchFilter();
            else window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderChips(branches) {
            const container = document.getElementById('dynamicChips');
            container.innerHTML = '';
            branches.forEach(b => {
                const btn = document.createElement('button');
                btn.className = "chip-branch px-8 py-3 rounded-2xl bg-white border border-slate-100 text-[10px] font-bold uppercase tracking-widest text-slate-400 italic";
                btn.innerText = b[1];
                btn.onclick = () => toggleFilter(b[1]);
                container.appendChild(btn);
            });
        }

        function renderBrandChips(sucursal) {
            const container = document.getElementById('dynamicChips');
            container.innerHTML = '';
            const marcas = [...new Set(globalInventory.filter(c => c.sucursalOrigen === sucursal).map(c => c.marca.toUpperCase()))];
            marcas.forEach(m => {
                const btn = document.createElement('button');
                btn.className = "chip-brand px-8 py-3 rounded-2xl bg-white border border-slate-100 text-[10px] font-bold uppercase italic tracking-widest text-slate-400";
                if(brandFilter === m) btn.classList.add('chip-active');
                btn.innerText = m;
                btn.onclick = () => { brandFilter = (brandFilter === m) ? null : m; renderBrandChips(sucursal); renderAll(); };
                container.appendChild(btn);
            });
        }

        function resetBranchFilter() {
            activeFilter = null; brandFilter = null;
            document.getElementById('headerDefault').classList.remove('hidden');
            document.getElementById('headerBranch').classList.add('hidden');
            renderChips(globalBranches);
            updateNavUI(); renderAll();
        }

        function toggleFilter(name) {
            activeFilter = name;
            document.getElementById('headerDefault').classList.add('hidden');
            document.getElementById('headerBranch').classList.remove('hidden');
            document.getElementById('branchTitle').innerText = activeFilter;
            renderBrandChips(activeFilter);
            updateNavUI(); renderAll();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function updateNavUI() {
            const btnBrands = document.getElementById('btn-bottom-brands');
            const bottomNav = document.getElementById('bottomNav');
            const returnBtn = document.getElementById('btnReturnToStock');
            if (currentSection === 'admin') {
                bottomNav.style.display = 'none'; returnBtn.style.display = 'flex';
            } else {
                bottomNav.style.display = 'flex'; returnBtn.style.display = 'none';
                btnBrands.style.display = (activeFilter !== null) ? 'none' : 'flex';
            }
        }

        function renderBrandDrawer() {
            const container = document.getElementById('drawerBrandList');
            const marcas = [...new Set(globalInventory.map(c => c.marca.toUpperCase()))];
            container.innerHTML = '';
            marcas.forEach(m => { container.innerHTML += `<button onclick="setBrandFilter('${m}')" class="p-4 bg-slate-50 rounded-xl text-[10px] font-bold uppercase italic">${m}</button>`; });
        }

        function setBrandFilter(m) { brandFilter = (brandFilter === m) ? null : m; if(activeFilter) renderBrandChips(activeFilter); renderAll(); if(document.getElementById('brandDrawer').classList.contains('drawer-open')) toggleDrawer(); }

        function renderAll() {
            const container = document.getElementById('mainGrid'), term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = globalInventory.filter(c => (!activeFilter || c.sucursalOrigen === activeFilter) && (!brandFilter || c.marca.toUpperCase() === brandFilter) && (!term || JSON.stringify(c).toLowerCase().includes(term)));
            container.innerHTML = '';
            if(filtered.length === 0 && globalInventory.length > 0) {
                container.innerHTML = '<div class="col-span-full py-20 text-center text-slate-300 font-black uppercase italic">No hay resultados</div>';
                return;
            }
            filtered.forEach((c) => {
                const isRes = c.estado === "Reservado", msg = encodeURIComponent(`Consulta: ${c.marca} ${c.modelo} - ${c.sucursalOrigen}`);
                const logo = `https://logo.clearbit.com/${c.marca.toLowerCase().replace(/\s/g, '')}.com`;
                container.innerHTML += `
                    <div class="group bg-white rounded-[2rem] overflow-hidden border border-slate-100 flex flex-col relative transition-all duration-500 shadow-xl">
                        <div class="absolute top-8 left-8 z-10 bg-white/60 backdrop-blur-md px-4 py-1.5 rounded-full text-[8px] font-black uppercase text-slate-500 italic border border-white/20">${c.sucursalOrigen}</div>
                        <div class="h-64 bg-slate-50 flex items-center justify-center relative">
                            <img src="${logo}" class="h-8 absolute top-8 right-8 opacity-20 grayscale transition-all duration-700 group-hover:opacity-100 group-hover:grayscale-0" onerror="this.style.display='none'">
                            <span class="material-symbols-outlined text-8xl text-slate-200 transition-transform duration-1000 group-hover:scale-110">directions_car</span>
                            ${isRes ? '<div class="absolute inset-0 bg-primary/10 flex items-center justify-center backdrop-blur-sm z-20 font-black"><span class="bg-primary text-white px-8 py-2 rounded-full text-[10px] uppercase tracking-widest leading-none">Reservado</span></div>' : ''}
                        </div>
                        <div class="p-10 flex flex-col">
                            <h3 class="text-2xl font-black uppercase italic text-slate-900 mb-2 leading-none tracking-tight group-hover:text-primary transition-colors italic">${c.marca} ${c.modelo}</h3>
                            <div class="grid grid-cols-2 gap-y-2 opacity-30 mb-8 text-[9px] font-bold italic uppercase tracking-widest leading-none">
                                <div class="flex items-center gap-2"><span class="material-symbols-outlined text-xs">calendar_today</span> ${c.anio}</div>
                                <div class="flex items-center gap-2"><span class="material-symbols-outlined text-xs">speed</span> ${Number(c.km).toLocaleString('de-DE')} KM</div>
                                <div class="flex items-center gap-2"><span class="material-symbols-outlined text-xs font-bold">bolt</span> ${c.combustible || 'S/I'}</div>
                                <div class="flex items-center gap-2"><span class="material-symbols-outlined text-xs">palette</span> ${c.color || 'S/I'}</div>
                            </div>
                            <p class="text-4xl font-black text-primary mb-8 italic leading-none">$${Number(c.pVenta).toLocaleString('de-DE')}</p>
                            <div class="flex gap-3">
                                <button onclick="window.location.href='https://wa.me/${WHATSAPP_NUMBER}?text=${msg}'" class="flex-1 bg-slate-50 hover:bg-primary hover:text-white py-6 rounded-[2rem] font-bold text-[10px] uppercase transition-all italic shadow-sm">Consultar</button>
                                ${c.instagram ? `<button onclick="window.location.href='${c.instagram}'" class="w-16 h-16 flex items-center justify-center bg-slate-50 rounded-[1.8rem] text-slate-400 hover:bg-slate-100 transition-all"><span class="material-symbols-outlined text-xl">photo_camera</span></button>` : ''}
                            </div>
                        </div>
                    </div>`;
            });
        }

        function showSection(id) {
            currentSection = id;
            document.querySelectorAll('.section-view').forEach(s => s.classList.add('hidden'));
            document.getElementById(`section-${id}`).classList.remove('hidden');
            document.getElementById('mosaicFloatingBtn').style.display = id === 'admin' ? 'none' : 'flex';
            updateNavUI(); window.scrollTo({top: 0, behavior: 'smooth'});
        }

        window.onload = initApp;
    </script>
</body>
</html>
